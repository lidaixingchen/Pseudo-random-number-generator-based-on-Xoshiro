name: Benchmark

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC 14
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y g++-14

      - name: Configure & Build
        run: |
          cmake -B build -DRANDX_BUILD_BENCHMARK=ON \
            -DCMAKE_CXX_COMPILER=g++-14 -DCMAKE_CXX_STANDARD=23
          cmake --build build --target benchmark_gbench -j$(nproc)

      - name: Run Benchmark
        run: |
          ./build/benchmark_gbench \
            --benchmark_format=json \
            --benchmark_out=result.json \
            --benchmark_repetitions=5 \
            --benchmark_report_aggregates_only=true

      - name: Download Baseline
        uses: actions/download-artifact@v4
        with:
          name: benchmark-baseline
          path: baseline
        continue-on-error: true

      - name: Compare with Baseline
        if: hashFiles('baseline/result.json') != ''
        run: python3 tools/compare_benchmark.py result.json baseline/result.json --tolerance 0.15

      - name: Upload Current Result as Baseline
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: result.json
          retention-days: 30
